<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="paleta.css">
    <script src="paleta.js"></script>

    <title>Personalizador de Botones</title>
</head>
<body>
    <div class="contenedor-principal">
        <div class="mb-lg" >
            <h1 class="text-2xl text-center">Personaliza TU BOTÓN</h1>
        </div>

        <div class="flex wrap gap-lg mb-lg">
            <div class="columna p-md">
                <h2 class="text-md text-left mb-md">Color texto</h2>
                <div class="flex flex-column gap-sm">
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorTexto" value="negro" checked>
                        <span class="text-sm">Negro</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorTexto" value="blanco">
                        <span class="text-sm">Blanco</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorTexto" value="rojo">
                        <span class="text-sm">Rojo</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorTexto" value="verde">
                        <span class="text-sm">Verde</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorTexto" value="azul">
                        <span class="text-sm">Azul</span>
                    </label>
                </div>
            </div>

            <div class="columna p-md">
                <h2 class="text-md text-left mb-md">Color fondo</h2>
                <div class="flex flex-column gap-sm">
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorFondo" value="blanco" checked>
                        <span class="text-sm">Blanco</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorFondo" value="negro">
                        <span class="text-sm">Negro</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorFondo" value="rojo">
                        <span class="text-sm">Rojo</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorFondo" value="verde">
                        <span class="text-sm">Verde</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="colorFondo" value="azul">
                        <span class="text-sm">Azul</span>
                    </label>
                </div>

            </div>

            <div class="columna p-md">
                <h2 class="text-md text-left mb-md">Tamaño</h2>
                <div class="flex flex-column gap-sm">
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="tamano" value="pequeno">
                        <span class="text-sm">Pequeño</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="tamano" value="mediano" checked>
                        <span class="text-sm">Mediano</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="tamano" value="grande">
                        <span class="text-sm">Grande</span>
                    </label>
                </div>
            </div>

            <div class="columna p-md">
                <h2 class="text-md text-left mb-md">Sombra</h2>
                <div class="flex flex-column gap-sm">
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="sombra" value="ninguna" checked>
                        <span class="text-sm">Sin sombra</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="sombra" value="suave">
                        <span class="text-sm">Sombra suave</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="sombra" value="oscura">
                        <span class="text-sm">Sombra oscura</span>
                    </label>
                </div>
            </div>

            <div class="columna p-md">
                <h2 class="text-md text-left mb-md">Borde</h2>
                <div class="flex flex-column gap-sm">
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="borde" value="ninguno" checked>
                        <span class="text-sm">Sin borde</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="borde" value="light">
                        <span class="text-sm">Borde sólido</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="borde" value="grueso">
                        <span class="text-sm">Borde grueso</span>
                    </label>
                </div>
            </div>

            <div class="columna p-md">
                <h2 class="text-md text-left mb-md">Radio de borde</h2>
                <div class="flex flex-column gap-sm">
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="radioBorde" value="ninguno" checked>
                        <span class="text-sm">Sin radio</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="radioBorde" value="pequeno">
                        <span class="text-sm">Radio pequeño</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="radioBorde" value="mediano">
                        <span class="text-sm">Radio mediano</span>
                    </label>
                    <label class="flex align-center gap-sm">
                        <input type="radio" name="radioBorde" value="grande">
                        <span class="text-sm">Radio grande</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="flex justify-center gap-md mb-lg">
            <button id="aplicarBtn" class="btn-accion btn-aplicar p-md">Aplicar</button>
            <button id="restablecerBtn" class="btn-accion btn-restablecer p-md">Restablecer</button>
        </div>
        
        <div class="p-lg">
            <h2 class="text-lg text-center mb-lg">Vista previa</h2>
            <div class="flex justify-center">
                <button id="vistaPreviaBtn" class="btn-muestra">Muestra</button>
            </div>
        </div>
    </div>

</body>
</html>
